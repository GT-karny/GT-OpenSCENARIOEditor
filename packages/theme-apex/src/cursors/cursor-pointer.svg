<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="g" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="b"/>
      <feFlood flood-color="#9B84E8" flood-opacity="0.3" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 1. Thumb (leftmost, at palm level) -->
  <rect x="1" y="17" width="4" height="6" fill="rgba(20,14,48,0.6)"
    stroke="#D0C6F2" stroke-opacity="0.5" stroke-width="1"/>
  <!-- 2. Index finger (TALLEST — the pointing finger) -->
  <rect x="6" y="1" width="4" height="16" fill="rgba(20,14,48,0.6)"
    stroke="#D0C6F2" stroke-opacity="0.5" stroke-width="1"/>
  <!-- 3. Middle finger (medium) -->
  <rect x="11" y="6" width="4" height="11" fill="rgba(20,14,48,0.6)"
    stroke="#D0C6F2" stroke-opacity="0.5" stroke-width="1"/>
  <!-- 4. Ring finger (shorter) -->
  <rect x="16" y="8" width="4" height="9" fill="rgba(20,14,48,0.6)"
    stroke="#D0C6F2" stroke-opacity="0.5" stroke-width="1"/>
  <!-- 5. Pinky (shortest) -->
  <rect x="21" y="10" width="4" height="7" fill="rgba(20,14,48,0.6)"
    stroke="#D0C6F2" stroke-opacity="0.5" stroke-width="1"/>
  <!-- Palm -->
  <rect x="4" y="17" width="22" height="9" fill="rgba(20,14,48,0.6)"
    stroke="#D0C6F2" stroke-opacity="0.5" stroke-width="1.2"/>
</svg>
