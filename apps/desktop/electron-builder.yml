appId: com.gt.openscenario-editor
productName: OpenSCENARIO Editor
copyright: Copyright 2024 GT

directories:
  output: release
  buildResources: build-resources

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - "**/*"

win:
  target:
    - target: portable
      arch:
        - x64

mac:
  target:
    - target: dir
      arch:
        - x64
        - arm64

linux:
  target:
    - target: dir
      arch:
        - x64

portable:
  artifactName: "OpenSCENARIO-Editor-${version}-portable.exe"

asar: true
asarUnpack:
  - "node_modules/@grpc/**"
  - "node_modules/protobufjs/**"

publish: null
