appId: com.gt.openscenario-editor
productName: OpenSCENARIO Editor
copyright: Copyright 2024 GT

directories:
  output: release
  buildResources: build-resources

# Main process is bundled by esbuild — workspace packages are inlined.
# Only dist/ and runtime node_modules deps are needed.
files:
  - dist/**/*
  - package.json
  - "!node_modules/@osce/**"

extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - "**/*"

win:
  sign: false
  signDlls: false
  target:
    - target: dir
      arch:
        - x64

mac:
  target:
    - target: dir
      arch:
        - x64
        - arm64

linux:
  target:
    - target: dir
      arch:
        - x64

portable:
  artifactName: "OpenSCENARIO-Editor-${version}-portable.exe"

asar: true
asarUnpack:
  - "node_modules/@grpc/**"
  - "node_modules/protobufjs/**"

npmRebuild: true

publish: null
