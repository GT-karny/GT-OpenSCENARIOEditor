appId: com.gt.openscenario-editor
productName: OpenSCENARIO Editor
copyright: Copyright 2024 GT

directories:
  output: release
  buildResources: build-resources

# Main process is bundled by esbuild — workspace packages are inlined.
# Only dist/ and runtime node_modules deps are needed.
files:
  - dist/**/*
  - package.json
  - "!node_modules/@osce/**"

extraResources:
  - from: ../web/dist
    to: web-dist
    filter:
      - "**/*"
  - from: ../../Thirdparty/GT_Sim/resources
    to: gtsim-resources
    filter:
      # Sample scenarios (same set as legacy esmini-demo seeding)
      - "xosc/cut-in.xosc"
      - "xosc/cut-in_simple.xosc"
      - "xosc/lane_change.xosc"
      - "xosc/highway_merge.xosc"
      - "xosc/pedestrian.xosc"
      # Referenced roads
      - "xodr/e6mini.xodr"
      - "xodr/jolengatan.xodr"
      - "xodr/soderleden.xodr"
      - "xodr/fabriksgatan.xodr"
      - "xodr/straight_500m.xodr"
      # Catalog files used by the seeded samples
      - "xosc/Catalogs/Vehicles/VehicleCatalog.xosc"
      - "xosc/Catalogs/Pedestrians/PedestrianCatalog.xosc"
      - "xosc/Catalogs/Controllers/ControllerCatalog.xosc"
      - "xosc/Catalogs/Routes/RoutesAtFabriksgatan.xosc"
      - "xosc/Catalogs/Maneuvers/HWManeuvers.xosc"

win:
  sign: false
  signDlls: false
  target:
    - target: dir
      arch:
        - x64

mac:
  target:
    - target: dir
      arch:
        - x64
        - arm64

linux:
  target:
    - target: dir
      arch:
        - x64

portable:
  artifactName: "OpenSCENARIO-Editor-${version}-portable.exe"

asar: true
asarUnpack:
  - "node_modules/@grpc/**"
  - "node_modules/protobufjs/**"

npmRebuild: true

publish: null
